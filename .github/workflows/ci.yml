name: Validate feeds

on:
  push:
    branches: [main]
    paths-ignore:
      - 'misp-feed/**'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate feeds format & freshness
        run: python3 tools/validate_feeds.py
